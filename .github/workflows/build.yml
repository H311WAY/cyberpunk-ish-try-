name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.8

      # ======================
      # SYSTEM DEPENDENCIES
      # ======================
      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y \
            git zip unzip openjdk-17-jdk \
            build-essential autoconf libtool pkg-config \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libgl1-mesa-dev libgles2-mesa-dev \
            python3-pip

      # ======================
      # PYTHON DEPENDENCIES
      # ======================
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install cython==0.29.36 buildozer kivy

      # ======================
      # CACHE BUILD
      # ======================
      - name: Cache buildozer
        uses: actions/cache@v4
        with:
          path: |
            .buildozer
            ~/.buildozer
          key: buildozer-${{ runner.os }}

      # ======================
      # INIT BUILD ENV
      # ======================
      - name: Init buildozer spec
        run: |
          if [ ! -f buildozer.spec ]; then
            buildozer init
          fi

      # ======================
      # ANDROID ENV FIX
      # ======================
      - name: Setup Android env
        run: |
          echo "ANDROID_HOME=$HOME/.buildozer/android/platform/android-sdk" >> $GITHUB_ENV
          echo "$HOME/.buildozer/android/platform/android-sdk/platform-tools" >> $GITHUB_PATH

      # ======================
      # ACCEPT SDK LICENSES
      # ======================
      - name: Accept Android SDK licenses
        run: |
          mkdir -p $HOME/.android
          touch $HOME/.android/repositories.cfg
          yes | buildozer android update || true

      # ======================
      # BUILD APK
      # ======================
      - name: Build APK
        run: |
          export PIP_BREAK_SYSTEM_PACKAGES=1
          buildozer -v android debug
